name: CI Develop

on:
  push:
    branches:
      - develop

env:
  PYTHON_VERSION: "3.12"

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install quality tools
        run: pip install black isort flake8 bandit --quiet

      - name: black
        run: black --check --line-length 100 src/ lambda_handler.py config/ scripts/

      - name: isort
        run: isort --check-only --profile black src/ lambda_handler.py config/ scripts/

      - name: flake8
        run: |
          flake8 src/ lambda_handler.py config/ \
            --max-line-length=100 \
            --extend-ignore=E203,W503

      - name: bandit
        run: bandit -r src/ lambda_handler.py -ll --quiet

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio --quiet

      - name: Run unit tests
        run: pytest src/tests/ --ignore=src/tests/integration -v

  bump-release:
    name: Abrir PR develop → release
    runs-on: ubuntu-latest
    needs: [quality, unit-tests]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configurar git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determinar próxima versão
        id: version
        run: |
          git fetch --tags
          LATEST=$(git tag -l "v[0-9]*.[0-9]*" | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            NEXT="1.0"
          else
            MAJOR=$(echo "$LATEST" | sed 's/v\([0-9]*\)\.\([0-9]*\)/\1/')
            MINOR=$(echo "$LATEST" | sed 's/v\([0-9]*\)\.\([0-9]*\)/\2/')
            NEXT="${MAJOR}.$((MINOR + 1))"
          fi
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Próxima versão: v$NEXT"

      - name: Criar branch release e abrir PR
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="release/$VERSION"

          # Cria a branch release a partir do main (base estável)
          git fetch origin main
          git checkout -b "$BRANCH" origin/main
          git push origin "$BRANCH"

          # Abre PR de develop → release/X.Y
          EXISTING=$(gh pr list --base "$BRANCH" --head develop --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING já existe. Pulando."
            exit 0
          fi

          CHANGELOG=$(git log origin/main..origin/develop --pretty=format:"- %s" 2>/dev/null || echo "- Release $VERSION")
          gh pr create \
            --base "$BRANCH" \
            --head develop \
            --title "Release $VERSION" \
            --body "$(printf "## Release %s\n\n### Mudanças incluídas\n%s\n\n---\nAo confirmar esse PR, o CI de integração será disparado automaticamente." "$VERSION" "$CHANGELOG")"

      - name: Criar tag de versão em develop
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v$VERSION"
          git checkout develop
          if git tag -l "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG já existe. Pulando."
            exit 0
          fi
          git tag "$TAG"
          git push origin "$TAG"
