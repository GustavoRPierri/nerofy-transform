name: Criar Release

on:
  workflow_dispatch:

jobs:
  bump-release:
    name: Criar Branch Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Configurar git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determinar próxima versão
        id: version
        run: |
          git fetch --tags
          LATEST=$(git tag -l "v[0-9]*.[0-9]*" | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            NEXT="1.0"
          else
            MAJOR=$(echo "$LATEST" | sed 's/v\([0-9]*\)\.\([0-9]*\)/\1/')
            MINOR=$(echo "$LATEST" | sed 's/v\([0-9]*\)\.\([0-9]*\)/\2/')
            NEXT="${MAJOR}.$((MINOR + 1))"
          fi
          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Próxima versão: v$NEXT"

      - name: Criar e publicar branch release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BRANCH="release/$VERSION"

          if git ls-remote --exit-code origin "refs/heads/$BRANCH" 2>/dev/null; then
            echo "Branch $BRANCH já existe. Pulando criação."
            exit 0
          fi

          git checkout -b "$BRANCH"
          git push origin "$BRANCH"
          echo "Branch $BRANCH criada — ci-integration.yml será disparado automaticamente."

      - name: Criar tag de versão
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v$VERSION"
          git checkout develop
          if git tag -l "$TAG" | grep -q "$TAG"; then
            echo "Tag $TAG já existe. Pulando."
            exit 0
          fi
          git tag "$TAG"
          git push origin "$TAG"
          echo "Tag $TAG criada em develop."
