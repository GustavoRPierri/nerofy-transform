name: CI Integration

on:
  push:
    branches:
      - 'release/**'
      - 'hotfix/**'
  pull_request:
    branches:
      - main

env:
  PYTHON_VERSION: "3.12"
  AWS_REGION: sa-east-1
  TF_VERSION: "1.7.5"

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install quality tools
        run: pip install black isort flake8 bandit --quiet

      - name: black
        run: black --check --line-length 100 src/ lambda_handler.py config/ scripts/

      - name: isort
        run: isort --check-only --profile black src/ lambda_handler.py config/ scripts/

      - name: flake8
        run: |
          flake8 src/ lambda_handler.py config/ \
            --max-line-length=100 \
            --extend-ignore=E203,W503

      - name: bandit
        run: bandit -r src/ lambda_handler.py -ll --quiet

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio --quiet

      - name: Run unit tests
        run: pytest src/tests/ --ignore=src/tests/integration -v

  oidc:
    name: Deploy OIDC IAM
    runs-on: ubuntu-latest
    needs: [quality, unit-tests]
    # Só aplica em push (não em PR checks)
    if: github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEPLOY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: infra/oidc
        run: terraform init

      - name: Terraform Apply
        working-directory: infra/oidc
        run: terraform apply -auto-approve -input=false

  create-pr:
    name: Create PR
    runs-on: ubuntu-latest
    needs: [unit-tests]
    # Só cria PR quando disparado por push (não em PR checks)
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Criar PR para main
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          BRANCH="${{ github.ref_name }}"

          EXISTING=$(gh pr list --base main --head "$BRANCH" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING já existe para $BRANCH → main. Pulando."
            exit 0
          fi

          if [[ "$BRANCH" =~ ^release/ ]]; then
            VERSION=$(echo "$BRANCH" | sed 's|release/||')
            TITLE="Release $VERSION"
            CHANGELOG=$(git log main..HEAD --pretty=format:"- %s" 2>/dev/null || echo "- Release $VERSION")
            BODY=$(printf "## Release %s\n\n### Mudanças incluídas\n%s\n\n---\nPR automático criado pelo CI após testes unitários e de integração passarem." "$VERSION" "$CHANGELOG")
          elif [[ "$BRANCH" =~ ^hotfix/ ]]; then
            DESC=$(echo "$BRANCH" | sed 's|hotfix/||')
            TITLE="Hotfix: $DESC"
            BODY=$(printf "## Hotfix: %s\n\nCorreção crítica aplicada diretamente sobre produção.\n\n---\nPR automático criado pelo CI após testes unitários e de integração passarem." "$DESC")
          fi

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "$TITLE" \
            --body "$BODY"
